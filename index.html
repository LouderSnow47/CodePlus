<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code+</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: #fff;
        }
        header {
            background: #1a1a1a;
            padding: 20px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
        }
        .section {
            max-width: 900px;
            margin: auto;
            padding: 40px;
        }
        .card {
            background: #1c1c1c;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        a.button {
            display: inline-block;
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>Code+</header>

<div class="section">
    <div class="card">
        <h2>Welcome to Code+</h2>
        <p>Learn to code in Python, Java, GDScript and more — with simple lessons anyone can follow.</p>
        <a class="button" href="#">Start Learning</a>
    </div>
</div>

</body>
</html>
